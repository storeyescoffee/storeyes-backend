spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      
  application:
    name: storeyes-coffee

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://15.216.37.183/realms/storeyes}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://15.216.37.183/realms/storeyes/protocol/openid-connect/certs}
          audience: ${KEYCLOAK_AUDIENCE:storeyes-mobile}

  # Outbound email (Gmail). Do not put the app password here — use SPRING_MAIL_PASSWORD (env / IDE / server).
  mail:
    host: smtp.gmail.com
    port: 587
    username: storeyes.morocco@gmail.com
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

app:
  password-reset:
    pepper: ${PASSWORD_RESET_PEPPER:storeyes-dev-pepper-change-in-production}
    code-ttl-minutes: ${PASSWORD_RESET_CODE_TTL_MINUTES:15}
    reset-token-ttl-minutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
    from-address: storeyes.morocco@gmail.com
  # Keycloak Admin REST — required for POST /auth/password-reset/complete.
  # client_credentials: realm + resource + credentials.secret below.
  # password grant (admin-username/password): token is always /realms/master/... + client admin-cli unless
  # password-grant-* below is set (override for non-default Keycloak layouts).
  # Legacy keys client-id / client-secret / auth-realm / users-realm / server-url still work.
  keycloak-admin:
    enabled: ${KEYCLOAK_ADMIN_ENABLED:true}
    require-client-secret-for-password-grant: ${KEYCLOAK_REQUIRE_SECRET_FOR_PASSWORD_GRANT:true}
    auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:${KEYCLOAK_ADMIN_SERVER_URL:http://15.216.37.183}}
    # Realm for client_credentials token only. If unset, issuer realm from jwt.issuer-uri.
    realm: ${KEYCLOAK_REALM:${KEYCLOAK_ADMIN_AUTH_REALM:}}
    # Optional overrides for password-grant token only (defaults: master + admin-cli in code).
    password-grant-realm: ${KEYCLOAK_ADMIN_PASSWORD_GRANT_REALM:}
    password-grant-client-id: ${KEYCLOAK_ADMIN_PASSWORD_GRANT_CLIENT_ID:}
    password-grant-client-secret: ${KEYCLOAK_ADMIN_PASSWORD_GRANT_CLIENT_SECRET:}
    user-management-realm: ${KEYCLOAK_USER_MANAGEMENT_REALM:${KEYCLOAK_ADMIN_USERS_REALM:storeyes}}
    resource: ${KEYCLOAK_CLIENT_ID:${KEYCLOAK_ADMIN_CLIENT_ID:storeyes-mobile}}
    credentials:
      secret: s3RNQkg4DtQPRmAA1olMa3FBjvdEhNd5
    admin-username: ${KEYCLOAK_ADMIN_USERNAME:msahtani}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:sahtouta@2025}

logging:
  level:
    root: INFO
    io.storeyes: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: ${SSL_KEYSTORE_PATH:file:keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:sahtout@2026}
    key-store-type: ${SSL_KEYSTORE_TYPE:PKCS12}
    key-alias: ${SSL_KEY_ALIAS:storeyes-blue}
    key-password: ${SSL_KEYSTORE_PASSWORD:sahtout@2026}
  http:
    port: ${HTTP_PORT:8080}

# AWS S3 Configuration
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:storeyes-documents}
    region: ${AWS_S3_REGION:eu-south-2}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
