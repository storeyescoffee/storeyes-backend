services:
  backend:
    image: eclipse-temurin:21-jre-alpine
    container_name: storeyes-backend
    working_dir: /app
    volumes:
      - /opt/storeyes/backend:/app
      - /opt/storeyes/certs/global-bundle.pem:/app/global-bundle.pem:ro
    command: java -jar /app/app.jar
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      # Database configuration (AWS RDS)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}?sslmode=verify-full&sslrootcert=/app/global-bundle.pem
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      # Server configuration
      - SERVER_PORT=${SERVER_PORT:-8443}
      # Keycloak configuration
      - KEYCLOAK_ISSUER_URI=${KEYCLOAK_ISSUER_URI:-http://15.216.37.183/realms/storeyes}
      - KEYCLOAK_JWKS_URI=${KEYCLOAK_JWKS_URI:-http://15.216.37.183/realms/storeyes/protocol/openid-connect/certs}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE:-storeyes-mobile}
      # Password reset (optional): Keycloak admin API + mail
      - KEYCLOAK_ADMIN_ENABLED=${KEYCLOAK_ADMIN_ENABLED:-false}
      - KEYCLOAK_AUTH_SERVER_URL=${KEYCLOAK_AUTH_SERVER_URL:-http://15.216.37.183}
      - KEYCLOAK_REQUIRE_SECRET_FOR_PASSWORD_GRANT=${KEYCLOAK_REQUIRE_SECRET_FOR_PASSWORD_GRANT:-true}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-storeyes-panel}
      - KEYCLOAK_USER_MANAGEMENT_REALM=${KEYCLOAK_USER_MANAGEMENT_REALM:-storeyes}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}
      - KEYCLOAK_ADMIN_USERNAME=${KEYCLOAK_ADMIN_USERNAME:-}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-}
      # Master-realm admin + admin-cli (password reset): token at /realms/master/... not app realm
      - KEYCLOAK_ADMIN_PASSWORD_GRANT_REALM=${KEYCLOAK_ADMIN_PASSWORD_GRANT_REALM:-}
      - KEYCLOAK_ADMIN_PASSWORD_GRANT_CLIENT_ID=${KEYCLOAK_ADMIN_PASSWORD_GRANT_CLIENT_ID:-}
      - KEYCLOAK_ADMIN_PASSWORD_GRANT_CLIENT_SECRET=${KEYCLOAK_ADMIN_PASSWORD_GRANT_CLIENT_SECRET:-}
      # Legacy env names (optional; map into app.keycloak-admin if you still use them in .env)
      - KEYCLOAK_ADMIN_CLIENT_ID=${KEYCLOAK_ADMIN_CLIENT_ID:-}
      - KEYCLOAK_ADMIN_CLIENT_SECRET=${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
      - KEYCLOAK_ADMIN_AUTH_REALM=${KEYCLOAK_ADMIN_AUTH_REALM:-}
      - KEYCLOAK_ADMIN_USERS_REALM=${KEYCLOAK_ADMIN_USERS_REALM:-}
      - KEYCLOAK_ADMIN_SERVER_URL=${KEYCLOAK_ADMIN_SERVER_URL:-}
      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST:-smtp.gmail.com}
      - SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-587}
      - SPRING_MAIL_USERNAME=${SPRING_MAIL_USERNAME:-}
      - SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD:-}
      - PASSWORD_RESET_FROM=${PASSWORD_RESET_FROM:-}
      # SSL certificate and key
      - SSL_KEYSTORE_PATH=${SSL_KEYSTORE_PATH:-file:keystore.p12}
      - SSL_KEYSTORE_PASSWORD=${SSL_KEYSTORE_PASSWORD:-sahtout@2026}
      - SSL_KEYSTORE_TYPE=${SSL_KEYSTORE_TYPE:-PKCS12}
      - SSL_KEY_ALIAS=${SSL_KEY_ALIAS:-storeyes-blue}
      # AWS configuration
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-storeyes-documents}
      - AWS_S3_REGION=${AWS_S3_REGION:-eu-south-2}
    restart: unless-stopped
    networks:
      - storeyes-network


networks:
  storeyes-network:
    driver: bridge
